  <style>
    #tap-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0d0520 0%, #000 100%);
      cursor: pointer;
      overflow: hidden;
    }
    #star-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .overlay-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 2;
      animation: fadeUp 1.2s ease both;
    }
    .tulip-svg {
      width: 22vmin;
      height: 28vmin;
      max-width: 120px;
      max-height: 160px;
      filter: drop-shadow(0 0 12px rgba(255,80,80,0.5));
      animation: floatTulip 3s ease-in-out infinite;
    }
    .overlay-title {
      margin: 3vmin 0 1vmin;
      font-family: Georgia, serif;
      font-size: clamp(24px, 7vmin, 48px);
      color: #fff;
      letter-spacing: 0.12em;
      text-align: center;
      font-style: italic;
      text-shadow: 0 0 30px rgba(255,160,160,0.6);
    }
    .overlay-sub {
      margin: 0 0 6vmin;
      font-family: sans-serif;
      font-size: clamp(12px, 3.2vmin, 18px);
      color: rgba(255,200,200,0.7);
      letter-spacing: 0.08em;
      text-align: center;
    }
    #enter-btn {
      position: relative;
      padding: 0;
      width: clamp(160px, 42vmin, 220px);
      height: clamp(44px, 12vmin, 56px);
      background: transparent;
      border: none;
      cursor: pointer;
      outline: none;
    }
    .btn-ring {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 1.5px solid rgba(255,180,180,0.55);
      animation: ringPulse 2s ease-in-out infinite;
    }
    .btn-text {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      font-family: sans-serif;
      font-size: clamp(12px, 3.2vmin, 16px);
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.1em;
      backdrop-filter: blur(6px);
      transition: background 0.3s;
    }
    #enter-btn:active .btn-text {
      background: rgba(255,255,255,0.15);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatTulip {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: 0.6; }
      50%       { transform: scale(1.08); opacity: 1;   }
    }
  </style>

  <script>
    /* ── Bintang berkedip ── */
    (function() {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      function initStars() {
        stars = Array.from({length: 160}, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          a: Math.random(),
          da: (Math.random() * 0.008 + 0.003) * (Math.random() < 0.5 ? 1 : -1)
        }));
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          s.a += s.da;
          if (s.a <= 0 || s.a >= 1) s.da *= -1;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,240,255,${s.a})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      resize(); initStars(); draw();
      window.addEventListener('resize', () => { resize(); initStars(); });
    })();

    /* ── Audio & overlay logic ── */
    window.addEventListener('load', () => {
      document.body.classList.remove('container');
      const audio   = document.getElementById('bg-music');
      const overlay = document.getElementById('tap-overlay');
      audio.currentTime = 50;
      audio.volume = 0;

      function startMusic() {
        audio.play().then(() => {
          let vol = 0;
          const fade = setInterval(() => {
            vol = Math.min(vol + 0.02, 1);
            audio.volume = vol;
            if (vol >= 1) clearInterval(fade);
          }, 100);
        }).catch(() => {});
      }

      function hideOverlay() {
        startMusic();
        overlay.style.transition = 'opacity 0.8s ease';
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 800);
      }

      audio.play().then(() => {
        audio.volume = 0;
        let vol = 0;
        const fade = setInterval(() => {
          vol = Math.min(vol + 0.02, 1);
          audio.volume = vol;
          if (vol >= 1) clearInterval(fade);
        }, 100);
        overlay.style.display = 'none';
      }).catch(() => {
        overlay.style.display = 'flex';
      });

      overlay.addEventListener('click', hideOverlay);
    });
  </script>
